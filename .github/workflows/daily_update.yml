name: Daily Baltic Index Update

on:
  schedule:
    - cron: '30 10 * * *'
    - cron: '0 14,19,22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install requests beautifulsoup4 pandas lxml holidays

    - name: Pull latest before run
      run: git pull --rebase origin main

    - name: Run scraper
      run: python scripts/update_indices.py

    - name: Run fund flow scraper (BDRY)
      run: python scripts/get_snapshots_scraper.py --ticker BDRY --start 2018-01-01 --update

    - name: Run fund flow scraper (BWET)
      run: python scripts/get_snapshots_scraper.py --ticker BWET --start 2023-01-01 --update

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/indices/bdiy_historical.csv data/indices/cape_historical.csv data/indices/panama_historical.csv data/indices/suprama_historical.csv data/indices/handysize_historical.csv data/indices/cleantanker_historical.csv data/indices/dirtytanker_historical.csv data/futures/bdryff_history.csv data/futures/bwetff_history.csv data/etf/BDRY_Daily.csv data/etf/BWET_Daily.csv data/futures/sgx_cape_futures.csv data/futures/sgx_panamax_futures.csv data/futures/sgx_supramax_futures.csv data/futures/sgx_handysize_futures.csv data/etf/BDRY_flows.csv data/etf/BWET_flows.csv
        if git diff --staged --quiet; then
          echo "No index/flow changes to commit."
          exit 0
        fi

        git commit -m "Update indices and flows $(date +'%Y-%m-%d %H:%M UTC')"

        for attempt in 1 2 3; do
          if git pull --rebase origin main && git push origin HEAD:main; then
            echo "Push succeeded on attempt $attempt."
            exit 0
          fi
          echo "Push race on attempt $attempt. Retrying in 10s..."
          sleep 10
        done

        echo "Failed to push after 3 attempts."
        exit 1
