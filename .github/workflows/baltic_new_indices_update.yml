name: Baltic New Indices Update

on:
  schedule:
    - cron: '30 10 * * 1-5'
    - cron: '0 14,19,22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: baltic-new-indices
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install requests

    - name: Pull latest before run
      run: git pull --rebase origin main

    - name: Run Baltic new indices scraper
      run: python scripts/baltic_new_indices.py --repo .

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add blng_historical.csv blpg_historical.csv fbx_historical.csv bai_historical.csv
        if git diff --staged --quiet; then
          echo "No Baltic new index changes to commit."
          exit 0
        fi

        git commit -m "Update Baltic new indices $(date +'%Y-%m-%d %H:%M UTC')"

        for attempt in 1 2 3; do
          if git pull --rebase origin main && git push origin HEAD:main; then
            echo "Push succeeded on attempt $attempt."
            exit 0
          fi
          echo "Push race on attempt $attempt. Retrying in 10s..."
          sleep 10
        done

        echo "Failed to push after 3 attempts."
        exit 1
