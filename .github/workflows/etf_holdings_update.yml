name: ETF Holdings Update (BDRY/BWET)

on:
  schedule:
    - cron: '0 14 * * 1-5'  # 2 PM UTC Monday-Friday (after market open data is available)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-holdings:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install pandas requests yfinance

    - name: Pull latest before run
      run: git pull --rebase origin main

    - name: Download and process ETF holdings
      run: python scripts/update_etf_holdings.py

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add bdry_holdings.csv bwet_holdings.csv bdry_liquidity.csv bwet_liquidity.csv
        if git diff --staged --quiet; then
          echo "No ETF holdings changes to commit."
          exit 0
        fi

        git commit -m "Update ETF holdings $(date +'%Y-%m-%d %H:%M UTC')"

        for attempt in 1 2 3; do
          if git pull --rebase origin main && git push origin HEAD:main; then
            echo "Push succeeded on attempt $attempt."
            exit 0
          fi
          echo "Push race on attempt $attempt. Retrying in 10s..."
          sleep 10
        done

        echo "Failed to push after 3 attempts."
        exit 1
