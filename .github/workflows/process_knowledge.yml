name: Process Knowledge Base

on:
  push:
    paths:
      - 'reports/**'
  workflow_dispatch:
    inputs:
      source:
        description: 'Source: breakwave | baltic | breakwave_insights | hellenic | books | all'
        default: 'all'
      rebuild:
        description: 'Full rebuild: true | false'
        default: 'false'

permissions:
  contents: write

concurrency:
  group: knowledge-pipeline
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install OCR runtime
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-eng poppler-utils

      - name: Install dependencies
        run: pip install -r requirements_knowledge.txt

      - name: Pull latest
        run: git pull origin main --rebase

      - name: Run processor
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MIN_INTERVAL_SEC: "2.5"
          GEMINI_MAX_RETRIES: "3"
          GEMINI_BACKOFF_BASE_SEC: "2.0"
          GEMINI_MAX_BACKOFF_SEC: "20.0"
          OLLAMA_BASE_URL: ${{ secrets.OLLAMA_BASE_URL }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          OLLAMA_MODEL: ${{ secrets.OLLAMA_MODEL }}
          OLLAMA_MIN_INTERVAL_SEC: "1.5"
          OLLAMA_MAX_RETRIES: "3"
          OLLAMA_BACKOFF_BASE_SEC: "1.5"
          OLLAMA_MAX_BACKOFF_SEC: "15.0"
          LLM_PROVIDER_ORDER: "ollama,gemini"
          MANIFEST_FLUSH_EVERY: "200"
          LINKED_PDF_PAGE_LIMIT: "16"
          LINKED_PDF_OCR_PAGE_LIMIT: "6"
          LINKED_TEXT_CHAR_LIMIT: "120000"
          LINKED_TABLE_ROW_LIMIT: "500"
          LINKED_TABLE_COL_LIMIT: "36"
          LINKED_IMAGE_OCR_CHAR_LIMIT: "9000"
          MIN_IMAGE_OCR_PIXELS: "90000"
          MAX_LINKED_ASSETS_PER_DOC: "28"
        shell: bash
        run: |
          set -o pipefail
          FLAGS=""
          SRC="${{ github.event.inputs.source || 'all' }}"
          RB="${{ github.event.inputs.rebuild || 'false' }}"
          [ "$SRC" != "all" ] && FLAGS="$FLAGS --source $SRC"
          [ "$RB" = "true" ] && FLAGS="$FLAGS --rebuild"
          python scripts/process_knowledge.py $FLAGS 2>&1 | tee knowledge_processor.log

      - name: Validate knowledge artifacts
        shell: bash
        run: |
          set -o pipefail
          python scripts/validate_knowledge.py 2>&1 | tee knowledge_validator.log

      - name: Prepare failure diagnostics
        if: failure()
        shell: bash
        run: |
          git status --porcelain > knowledge_changed_files.txt || true
          git diff --name-only > knowledge_changed_tracked.txt || true

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: knowledge-failure-diagnostics-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            knowledge/manifests/**
            knowledge/reports/**
            knowledge_processor.log
            knowledge_validator.log
            knowledge_changed_files.txt
            knowledge_changed_tracked.txt

      - name: Commit knowledge artifacts
        shell: bash
        run: |
          git config user.name "knowledge-bot"
          git config user.email "bot@shipping"
          git add knowledge/
          git diff --staged --quiet || git commit -m "knowledge: update $(date -u +%Y-%m-%d)"
          git push
