name: Daily Knowledge Update

on:
  schedule:
    - cron: '30 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: knowledge-pipeline
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements_knowledge.txt

      - name: Pull latest
        run: git pull origin main --rebase

      - name: Check for new reports
        id: check
        shell: bash
        run: |
          MANIFEST="knowledge/manifests/documents.jsonl"
          if [ ! -f "$MANIFEST" ]; then
            echo "new=true" >> "$GITHUB_OUTPUT"
          else
            REPORTS_TS="$(git log -1 --format=%ct -- reports 2>/dev/null || echo 0)"
            MANIFEST_TS="$(git log -1 --format=%ct -- "$MANIFEST" 2>/dev/null || echo 0)"
            if [ "$REPORTS_TS" -gt "$MANIFEST_TS" ]; then
              echo "new=true" >> "$GITHUB_OUTPUT"
            else
              echo "new=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Process new reports
        if: steps.check.outputs.new == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MIN_INTERVAL_SEC: "4.0"
          GEMINI_MAX_RETRIES: "8"
          GEMINI_BACKOFF_BASE_SEC: "4.0"
          GEMINI_MAX_BACKOFF_SEC: "90.0"
          OLLAMA_BASE_URL: ${{ secrets.OLLAMA_BASE_URL }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          OLLAMA_MODEL: ${{ secrets.OLLAMA_MODEL }}
          OLLAMA_MIN_INTERVAL_SEC: "2.5"
          OLLAMA_MAX_RETRIES: "6"
          OLLAMA_BACKOFF_BASE_SEC: "3.0"
          OLLAMA_MAX_BACKOFF_SEC: "60.0"
        run: python scripts/process_knowledge.py

      - name: Validate updated knowledge
        if: steps.check.outputs.new == 'true'
        run: python scripts/validate_knowledge.py

      - name: Commit if changes
        if: steps.check.outputs.new == 'true'
        shell: bash
        run: |
          git config user.name "knowledge-bot"
          git config user.email "bot@shipping"
          git add knowledge/
          git diff --staged --quiet || git commit -m "knowledge: daily update $(date -u +%Y-%m-%d)"
          git push
